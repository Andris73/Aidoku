name: Build and upload nightly ipa

on: [push, workflow_dispatch]

permissions:
  contents: write

jobs:
  lint:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install SwiftLint
        run: HOMEBREW_NO_AUTO_UPDATE=1 brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --reporter github-actions-logging

  build:
    needs: lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"
      - name: Install Xcode platforms
        run: |
          xcrun simctl list > /dev/null # fixes next command sometimes failing
          xcodebuild -downloadPlatform iOS
      - name: Get commit info
        id: commitinfo
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"
          echo "build_number=$(date +'%Y%m%d%H%M')" >> "$GITHUB_OUTPUT"
      - name: Bump version
        run: |
          # Set build number to date-based value (YYYYMMDDHHmm) so every build is unique
          agvtool new-version -all ${{ steps.commitinfo.outputs.build_number }}
      - name: Build
        run: xcodebuild -scheme "Aidoku (iOS)" -configuration Release archive -archivePath build/Aidoku.xcarchive -skipPackagePluginValidation CODE_SIGN_IDENTITY= CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
      - name: Package ipa
        run: |
          mkdir Payload
          cp -r build/Aidoku.xcarchive/Products/Applications/Aidoku.app Payload
          zip -r Aidoku-iOS_nightly-${{ steps.commitinfo.outputs.sha_short }}.ipa Payload
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Aidoku-iOS_nightly-${{ steps.commitinfo.outputs.sha_short }}.ipa
          path: Aidoku-iOS_nightly-${{ steps.commitinfo.outputs.sha_short }}.ipa
          if-no-files-found: error
      - name: Create or update nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build (${{ steps.commitinfo.outputs.date }})
          body: |
            Automated nightly build from commit ${{ steps.commitinfo.outputs.sha_short }} on ${{ steps.commitinfo.outputs.date }}.

            **Commit:** [`${{ steps.commitinfo.outputs.sha_short }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            **Branch:** `${{ github.ref_name }}`
          prerelease: true
          files: Aidoku-iOS_nightly-${{ steps.commitinfo.outputs.sha_short }}.ipa
          make_latest: false

  update-source:
    needs: build
    uses: ./.github/workflows/update_livecontainer_source.yml
