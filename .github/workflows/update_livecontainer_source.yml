name: Update LiveContainer Source

on:
  release:
    types: [published]
  workflow_call: # Allow chaining from other workflows
  workflow_dispatch: # Allow manual trigger

jobs:
  update-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Update LiveContainer source
        id: update_source
        run: |
          python .github/workflows/supporting/update_livecontainer_json.py

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4.7.2
        with:
          branch: livecontainer
          folder: .github/workflows/supporting/livecontainer
          git-config-name: GitHub Actions
          git-config-email: github-actions[bot]@users.noreply.github.com
          commit-message: Update LiveContainer Source
          single-commit: true
